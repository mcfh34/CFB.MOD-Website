<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFB Model | Stats</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: #fafafa;
      color: #111827;
    }
    .wrap { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    a { color: #374151; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: .8rem;
    }
    .stat {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: .9rem;
    }
    .label { color: #6b7280; font-size: .9rem; }
    .value { font-size: 1.3rem; font-weight: 600; margin-top: .2rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Stats Page</h1>
      <a href="index.html">← Back Home</a>
    </div>

    <section class="grid">
      <article class="stat">
        <div class="label">Offensive Efficiency</div>
        <div class="value">+0.27 EPA/play</div>
      </article>
      <article class="stat">
        <div class="label">Defensive Efficiency</div>
        <div class="value">-0.15 EPA/play</div>
      </article>
      <article class="stat">
        <div class="label">Pace</div>
        <div class="value">2.38 plays/min</div>
      </article>
      <article class="stat">
        <div class="label">Explosive Play Rate</div>
        <div class="value">14.2%</div>
      </article>
    </section>
  </main>
</body>
</html>
