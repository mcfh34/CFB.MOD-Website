<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFB Model | Matchups</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: #fafafa;
      color: #111827;
    }
    .wrap { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    a { color: #374151; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card {
      margin-top: 1rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .7rem .4rem; border-bottom: 1px solid #f3f4f6; text-align: left; }
    th { font-size: .9rem; color: #6b7280; font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Matchup Page</h1>
      <a href="index.html">← Back Home</a>
    </div>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>Game</th>
            <th>Model Favorite</th>
            <th>Win Prob.</th>
            <th>Projected Score</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Team A at Team B</td>
            <td>Team B</td>
            <td>64%</td>
            <td>31 - 24</td>
          </tr>
          <tr>
            <td>Team C at Team D</td>
            <td>Team C</td>
            <td>58%</td>
            <td>27 - 21</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
